name = "proxy"
main = "worker.ts"
compatibility_date = "2024-01-01"

# Comma-separated list of SPA origins allowed to use this proxy.
# localhost / 127.0.0.1 are always permitted for development.
# Set the deployed SPA origin(s) here. For local tunnels (e.g. ngrok), put the
# tunnel origin in proxy/.dev.vars (gitignored) — it overrides this for `wrangler dev`.
[vars]
ALLOWED_ORIGINS = "https://your-app.example.com"

# Smart placement routes the Worker to the edge location closest to the upstream origin.
# api.enablebanking.com resolves to Google Cloud in Brussels (BE), so this naturally
# keeps execution in the EU

mode = "smart"

# Per-IP rate limiting (fixed window). Without a bound KV, rate limiting is skipped.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID" # create with: wrangler kv namespace create RATE_LIMIT_KV
