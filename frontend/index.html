<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy. connect-src permits any HTTPS origin because users
      may configure their own custom proxy at runtime (Settings) and a static CSP
      cannot enumerate those. The primary XSS defense is the strict script-src
      'self' (no inline/eval), which prevents injected script from running at all.
      frame-ancestors cannot be set via <meta> — see public/_headers.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; object-src 'none'; base-uri 'none'; form-action 'self'"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lommin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
